<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wordcraft — 英文單字練習本</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Lato:wght@300;400;700&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#1A1A14;
  --paper:#F5F0E8;
  --cream:#EDE8DC;
  --gold:#B8892A;
  --gold-light:#E8C96A;
  --gold-muted:#D4AA55;
  --sage:#4A6741;
  --sage-light:#7A9E70;
  --rust:#8B3A2A;
  --rust-light:#C4614A;
  --text-main:#1A1A14;
  --text-muted:#6B6455;
  --text-faint:#9A9080;
  --card-bg:#FDFAF4;
  --card-border:#D8CFBA;
  --input-bg:#F0EBE0;
  --shadow:0 2px 16px rgba(26,20,10,0.10);
  --shadow-lg:0 8px 40px rgba(26,20,10,0.16);
}

html,body{min-height:100vh}
body{
  font-family:'Lato',sans-serif;
  background:var(--paper);
  color:var(--text-main);
  background-image:
    radial-gradient(ellipse at 10% 0%,rgba(184,137,42,0.07) 0%,transparent 55%),
    radial-gradient(ellipse at 90% 100%,rgba(74,103,65,0.07) 0%,transparent 55%);
}

.app{max-width:740px;margin:0 auto;padding:2rem 1.25rem 5rem}

/* Header */
.header{margin-bottom:2.5rem}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo-mark{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--gold);letter-spacing:0.08em;margin-bottom:6px}
.header h1{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;line-height:1.1;color:var(--ink);letter-spacing:-0.01em}
.header h1 em{font-style:italic;color:var(--gold)}
.header-stats{display:flex;gap:24px;flex-shrink:0;padding-bottom:4px}
.hstat{text-align:right}
.hstat-num{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:var(--gold);line-height:1}
.hstat-label{font-size:11px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.header-divider{width:100%;height:1px;background:linear-gradient(90deg,var(--gold) 0%,var(--card-border) 40%,transparent 100%);margin-top:20px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid var(--card-border)}
.tab{padding:10px 22px;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border:none;background:none;cursor:pointer;color:var(--text-faint);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;font-family:'Lato',sans-serif}
.tab:hover{color:var(--text-main)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab i{margin-right:6px;font-size:15px;vertical-align:-2px}

.panel{display:none}.panel.active{display:block}

/* Library toolbar */
.lib-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:16px}
.search-input{width:100%;padding:9px 12px 9px 34px;font-size:14px;font-family:'Lato',sans-serif;border:1px solid var(--card-border);border-radius:9px;background:var(--card-bg);color:var(--text-main);outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--gold-muted)}
.search-input::placeholder{color:var(--text-faint)}

/* Word list */
.word-list{display:flex;flex-direction:column;gap:9px;margin-bottom:1.5rem}

.word-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:flex-start;gap:14px;
  transition:box-shadow 0.2s,border-color 0.2s,transform 0.15s;
  animation:fadeUp 0.3s ease both;
}
.word-card:hover{box-shadow:var(--shadow);border-color:var(--gold-muted);transform:translateY(-1px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.wc-left{flex:1;min-width:0}
.wc-word{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink);line-height:1.2}
.mastered-tag{font-size:11px;font-family:'Lato',sans-serif;font-weight:700;color:var(--sage);background:rgba(74,103,65,0.12);border-radius:10px;padding:2px 8px;margin-left:8px;vertical-align:middle;letter-spacing:0.04em}
.wc-phonetic{font-size:12px;color:var(--gold-muted);margin-top:3px;font-style:italic;letter-spacing:0.03em}
.wc-meaning{font-size:14px;color:var(--text-muted);margin-top:6px;line-height:1.5}
.wc-meta{font-size:11px;color:var(--text-faint);margin-top:5px}

.wc-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-items:flex-end}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--card-border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:16px;transition:all 0.15s}
.icon-btn:hover{background:var(--cream);color:var(--text-main);border-color:var(--text-faint)}
.icon-btn.play:hover,.icon-btn.play.loading{background:rgba(184,137,42,0.12);border-color:var(--gold-muted);color:var(--gold)}
.icon-btn.danger:hover{background:rgba(139,58,42,0.10);border-color:var(--rust-light);color:var(--rust)}
@keyframes spin{to{transform:rotate(360deg)}}
.icon-btn.loading i{animation:spin 0.8s linear infinite}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:1.2rem}
.page-btn{padding:6px 14px;border:1px solid var(--card-border);border-radius:8px;background:var(--card-bg);color:var(--text-muted);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:'Lato',sans-serif}
.page-btn:hover{border-color:var(--gold-muted);color:var(--gold)}
.page-btn:disabled{opacity:0.35;cursor:default}
.page-info{font-size:13px;color:var(--text-faint)}

/* Add form */
.add-form{background:var(--cream);border:1px solid var(--card-border);border-radius:16px;padding:20px;margin-top:8px}
.add-form-title{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
input,textarea,select{width:100%;padding:10px 14px;font-size:14px;font-family:'Lato',sans-serif;border:1px solid var(--card-border);border-radius:9px;background:var(--card-bg);color:var(--text-main);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
input:focus,textarea:focus{border-color:var(--gold-muted);box-shadow:0 0 0 3px rgba(184,137,42,0.10)}
textarea{height:68px;resize:none}
input::placeholder,textarea::placeholder{color:var(--text-faint)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;font-size:13px;font-weight:700;letter-spacing:0.05em;font-family:'Lato',sans-serif;border-radius:9px;cursor:pointer;transition:all 0.18s;border:1px solid}
.btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-primary:hover{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.btn-ghost{background:none;color:var(--text-muted);border-color:var(--card-border)}
.btn-ghost:hover{background:var(--cream);border-color:var(--text-faint);color:var(--text-main)}
.btn-danger{background:none;color:var(--rust);border-color:var(--rust-light)}
.btn-danger:hover{background:rgba(139,58,42,0.08)}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* IO section */
.io-section{background:var(--cream);border:1px solid var(--card-border);border-radius:16px;padding:18px;margin-bottom:1.2rem}
.io-section h3{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
.io-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.io-note{font-size:12px;color:var(--text-faint);margin-top:8px}

/* Empty state */
.empty-state{text-align:center;padding:56px 20px;color:var(--text-faint)}
.empty-icon{font-size:44px;display:block;margin-bottom:16px;opacity:0.3}
.empty-state p{font-size:15px;line-height:1.6}
.empty-state strong{color:var(--text-muted)}

/* Quiz hero */
.quiz-hero{background:var(--ink);border-radius:20px;padding:28px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.quiz-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(184,137,42,0.18) 0%,transparent 70%)}
.quiz-hero-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--paper);margin-bottom:4px}
.quiz-hero-sub{font-size:13px;color:rgba(245,240,232,0.5)}
.setup-section{margin-top:18px}
.setup-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,240,232,0.45);margin-bottom:10px}
.chip-group{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 16px;border:1px solid rgba(245,240,232,0.2);border-radius:40px;font-size:13px;font-weight:400;cursor:pointer;transition:all 0.15s;background:transparent;color:rgba(245,240,232,0.6);font-family:'Lato',sans-serif}
.chip:hover{border-color:var(--gold-muted);color:var(--gold-light)}
.chip.sel{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700}
.quiz-start-btn{margin-top:22px;width:100%;padding:14px;font-size:15px;font-weight:700;letter-spacing:0.06em;font-family:'Lato',sans-serif;background:var(--gold);color:var(--ink);border:none;border-radius:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.quiz-start-btn:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 4px 20px rgba(184,137,42,0.35)}

/* Quiz card */
.quiz-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:32px 28px;box-shadow:var(--shadow-lg);animation:fadeUp 0.35s ease both}
.q-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.q-counter{font-size:13px;color:var(--text-faint);font-weight:700;letter-spacing:0.04em}
.q-type-pill{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.q-type-mc{background:rgba(74,103,65,0.12);color:var(--sage)}
.q-type-spell{background:rgba(184,137,42,0.12);color:var(--gold-muted)}
.progress-track{height:3px;background:var(--cream);border-radius:2px;overflow:hidden;margin-bottom:28px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-light) 100%);border-radius:2px;transition:width 0.4s ease}
.q-prompt{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}
.q-word{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;color:var(--ink);line-height:1.15;margin-bottom:6px}
.q-phonetic{font-size:14px;color:var(--gold-muted);font-style:italic;margin-bottom:14px}

.audio-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:20px;border:1px solid var(--gold-muted);background:rgba(184,137,42,0.07);color:var(--gold);font-size:13px;font-family:'Lato',sans-serif;cursor:pointer;transition:all 0.15s;margin-bottom:20px}
.audio-btn:hover{background:rgba(184,137,42,0.15);transform:scale(1.02)}
.audio-btn:disabled{opacity:0.6;cursor:default;transform:none}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.choice-btn{padding:14px 16px;border:1.5px solid var(--card-border);border-radius:12px;background:var(--card-bg);color:var(--text-main);font-size:14px;cursor:pointer;transition:all 0.15s;text-align:left;font-family:'Lato',sans-serif;line-height:1.4}
.choice-btn:hover:not(:disabled){border-color:var(--gold-muted);background:rgba(184,137,42,0.06);transform:translateY(-1px)}
.choice-btn.correct{background:rgba(74,103,65,0.10);border-color:var(--sage-light);color:var(--sage);font-weight:700}
.choice-btn.wrong{background:rgba(139,58,42,0.08);border-color:var(--rust-light);color:var(--rust)}

.spell-input{width:100%;padding:16px;font-size:26px;font-family:'Playfair Display',serif;text-align:center;border:1.5px solid var(--card-border);border-radius:12px;background:var(--input-bg);color:var(--ink);outline:none;letter-spacing:3px;margin-bottom:12px;transition:all 0.2s}
.spell-input:focus{border-color:var(--gold-muted);box-shadow:0 0 0 4px rgba(184,137,42,0.09);background:var(--card-bg)}
.spell-input.correct{border-color:var(--sage-light);background:rgba(74,103,65,0.06);color:var(--sage)}
.spell-input.wrong{border-color:var(--rust-light);background:rgba(139,58,42,0.06);color:var(--rust)}

.feedback-bar{padding:11px 16px;border-radius:10px;font-size:14px;margin-bottom:14px;display:none;animation:fadeUp 0.2s ease}
.feedback-bar.show{display:block}
.feedback-bar.correct{background:rgba(74,103,65,0.10);color:var(--sage);border-left:3px solid var(--sage-light)}
.feedback-bar.wrong{background:rgba(139,58,42,0.08);color:var(--rust);border-left:3px solid var(--rust-light)}

.q-actions{display:flex;gap:9px;justify-content:flex-end;flex-wrap:wrap}

/* Result */
.result-wrap{text-align:center;padding:16px 0 8px}
.result-ring{width:130px;height:130px;border-radius:50%;margin:0 auto 20px;border:3px solid var(--card-border);display:flex;align-items:center;justify-content:center;flex-direction:column;background:var(--card-bg);box-shadow:0 0 0 8px var(--cream)}
.result-pct{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--gold);line-height:1}
.result-label-sm{font-size:11px;color:var(--text-faint);letter-spacing:0.06em}
.result-msg{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--ink);margin-bottom:6px}
.result-sub{font-size:14px;color:var(--text-muted);margin-bottom:22px}
.result-breakdown{display:flex;justify-content:center;gap:32px;margin-bottom:28px}
.rb-item{text-align:center}
.rb-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:500}
.rb-num.good{color:var(--sage)}.rb-num.bad{color:var(--rust)}
.rb-lbl{font-size:12px;color:var(--text-faint);margin-top:2px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:var(--paper);padding:11px 22px;border-radius:24px;font-size:13px;font-family:'Lato',sans-serif;opacity:0;transition:all 0.3s;z-index:9999;white-space:nowrap;box-shadow:var(--shadow-lg);border:1px solid rgba(184,137,42,0.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,20,10,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card-bg);border-radius:18px;padding:28px;max-width:440px;width:100%;box-shadow:var(--shadow-lg);transform:translateY(16px);transition:transform 0.2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;color:var(--ink)}
.modal p{font-size:14px;color:var(--text-muted);margin-bottom:18px;line-height:1.6}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 0.8s linear infinite}

@media(max-width:540px){
  .form-row{grid-template-columns:1fr}
  .choices{grid-template-columns:1fr}
  .q-word{font-size:28px}
  .header-stats{display:none}
  .header h1{font-size:28px}
  .quiz-card{padding:22px 16px}
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-mark">vocabulary studio</div>
        <h1>Word<em>craft</em></h1>
      </div>
      <div class="header-stats">
        <div class="hstat"><div class="hstat-num" id="hs-total">0</div><div class="hstat-label">單字</div></div>
        <div class="hstat"><div class="hstat-num" id="hs-mastered">0</div><div class="hstat-label">熟練</div></div>
      </div>
    </div>
    <div class="header-divider"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('library')"><i class="ti ti-books"></i>單字庫</button>
    <button class="tab" onclick="switchTab('quiz')"><i class="ti ti-brain"></i>測驗</button>
  </div>

  <!-- ═══════════════ LIBRARY ═══════════════ -->
  <div id="tab-library" class="panel active">

    <!-- IO section -->
    <div class="io-section">
      <h3><i class="ti ti-database" aria-hidden="true"></i> 單字庫管理</h3>
      <div class="io-row">
        <button class="btn btn-ghost" onclick="exportWords()"><i class="ti ti-download"></i>匯出 JSON</button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()"><i class="ti ti-upload"></i>匯入 JSON</button>
        <button class="btn btn-ghost" onclick="loadPreset()"><i class="ti ti-sparkles"></i>載入預設單字庫</button>
        <button class="btn btn-danger" onclick="openClearModal()"><i class="ti ti-trash"></i>清空</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importWords(event)"/>
      </div>
      <div class="io-note">💡 匯出 JSON 後可在其他裝置匯入，資料不會因清除快取而遺失。</div>
    </div>

    <!-- Search + toolbar -->
    <div class="lib-toolbar">
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input class="search-input" id="search-input" placeholder="搜尋單字或意思…" oninput="renderLibrary()"/>
      </div>
      <span id="lib-count" style="font-size:13px;color:var(--text-faint);white-space:nowrap"></span>
    </div>

    <div class="word-list" id="word-list"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- Add form -->
    <div class="add-form">
      <div class="add-form-title"><i class="ti ti-plus" aria-hidden="true"></i> 新增單字</div>
      <div class="form-row">
        <input id="new-word" placeholder="英文單字" onkeydown="if(event.key==='Enter')document.getElementById('new-meaning').focus()"/>
        <input id="new-phonetic" placeholder="音標（選填）e.g. /ˈæpəl/"/>
      </div>
      <textarea id="new-meaning" placeholder="中文意思 / 解釋" onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))addWord()"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addWord()"><i class="ti ti-plus"></i>新增單字</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ QUIZ ═══════════════ -->
  <div id="tab-quiz" class="panel">

    <!-- Setup -->
    <div id="quiz-setup-view">
      <div class="quiz-hero">
        <div class="quiz-hero-title">開始今日測驗</div>
        <div class="quiz-hero-sub">自訂題型與題數，挑戰自己</div>
        <div class="setup-section">
          <div class="setup-label">題目類型</div>
          <div class="chip-group">
            <div class="chip sel" id="chip-mc" onclick="toggleChip('mc')">選擇題</div>
            <div class="chip sel" id="chip-spell" onclick="toggleChip('spell')">拼寫題</div>
          </div>
        </div>
        <div class="setup-section">
          <div class="setup-label">方向</div>
          <div class="chip-group">
            <div class="chip sel" id="chip-en2zh" onclick="selectDir('en2zh')">英 → 中</div>
            <div class="chip" id="chip-zh2en" onclick="selectDir('zh2en')">中 → 英</div>
            <div class="chip" id="chip-mix" onclick="selectDir('mix')">混合</div>
          </div>
        </div>
        <div class="setup-section">
          <div class="setup-label">題數</div>
          <div class="chip-group">
            <div class="chip sel" id="chip-10" onclick="selectCount(10)">10 題</div>
            <div class="chip" id="chip-20" onclick="selectCount(20)">20 題</div>
            <div class="chip" id="chip-all" onclick="selectCount(0)">全部</div>
          </div>
        </div>
        <button class="quiz-start-btn" onclick="startQuiz()"><i class="ti ti-player-play"></i>開始測驗</button>
      </div>
    </div>

    <!-- Play -->
    <div id="quiz-play-view" style="display:none">
      <div class="quiz-card">
        <div class="q-top">
          <div class="q-counter" id="q-progress">1 / 10</div>

function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(words)); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['library','quiz'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');

// ─── Audio ───
async function playAudio(word, btnId){
  if(!word) return;
  const btn = btnId ? document.getElementById(btnId) : null;
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 載入中…'; }
  try{
    if(audioCache[word]){
      new Audio(audioCache[word]).play();
    } else {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      const data = await res.json();
      const audio = data[0]?.phonetics?.find(p=>p.audio)?.audio;
      if(audio){ audioCache[word]=audio; new Audio(audio).play(); }
      else showToast('找不到此單字的發音音檔');
    }
  } catch(e){ showToast('發音 API 暫時無法連線'); }
  if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-volume"></i> 聆聽發音'; }
}

// ─── Library ───
function getFiltered(){
  const q = (document.getElementById('search-input')?.value||'').trim().toLowerCase();
  if(!q) return words;
  return words.filter(w=>w.word.toLowerCase().includes(q)||w.meaning.toLowerCase().includes(q));
}

function renderLibrary(){
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage-1)*PAGE_SIZE;
  const pageWords = filtered.slice(start, start+PAGE_SIZE);

  document.getElementById('hs-total').textContent = words.length;
  document.getElementById('hs-mastered').textContent = words.filter(w=>w.mastered).length;
  document.getElementById('lib-count').textContent = total !== words.length ? `${total} / ${words.length} 個單字` : `${words.length} 個單字`;

  const list = document.getElementById('word-list');
  if(!words.length){
    list.innerHTML=`<div class="empty-state"><i class="ti ti-book-2 empty-icon" aria-hidden="true"></i><p>單字庫是空的。<br><strong>新增單字</strong>或點「載入預設單字庫」開始！</p></div>`;
  } else if(!pageWords.length){
    list.innerHTML=`<div class="empty-state"><i class="ti ti-search empty-icon" aria-hidden="true"></i><p>找不到符合的單字。</p></div>`;
  } else {
    const globalStart = words.indexOf(filtered[start]);
    list.innerHTML = pageWords.map((w)=>{
      const gi = words.indexOf(w);
      return `<div class="word-card" style="animation-delay:${(words.indexOf(w)-globalStart)*0.03}s">
        <div class="wc-left">
          <div class="wc-word">${escHtml(w.word)}${w.mastered?'<span class="mastered-tag">MASTERED</span>':''}</div>
          ${w.phonetic?`<div class="wc-phonetic">${escHtml(w.phonetic)}</div>`:''}
          <div class="wc-meaning">${escHtml(w.meaning)}</div>
          ${w.quizCount?`<div class="wc-meta">測驗 ${w.quizCount} 次${w.streak>=2?` · 🔥 連續答對 ${w.streak} 次`:''}</div>`:''}
        </div>
        <div class="wc-actions">
          <button class="icon-btn play" id="play-lib-${gi}" onclick="playAudio('${escAttr(w.word)}','play-lib-${gi}')" title="聆聽發音"><i class="ti ti-volume" aria-hidden="true"></i></button>
          <button class="icon-btn danger" onclick="removeWord(${gi})" title="刪除"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>
      </div>`;
    }).join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  if(totalPages<=1){ pg.innerHTML=''; return; }
  pg.innerHTML=`
    <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>← 上一頁</button>
    <span class="page-info">${currentPage} / ${totalPages}</span>
    <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>下一頁 →</button>`;
}

function goPage(p){ currentPage=p; renderLibrary(); window.scrollTo({top:0,behavior:'smooth'}); }

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s).replace(/'/g,"\\'"); }

function addWord(){
  const word = document.getElementById('new-word').value.trim();
  const meaning = document.getElementById('new-meaning').value.trim();
  const phonetic = document.getElementById('new-phonetic').value.trim();
  if(!word||!meaning){ showToast('請填寫單字與意思'); return; }
  if(words.find(w=>w.word.toLowerCase()===word.toLowerCase())){ showToast('單字已存在！'); return; }
  words.unshift({word,meaning,phonetic,quizCount:0,mastered:false,streak:0,addedAt:Date.now()});
  save(); currentPage=1; renderLibrary();
  ['new-word','new-meaning','new-phonetic'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('new-word').focus();
  showToast(`「${word}」已新增 ✓`);
}

function removeWord(i){
  const w = words[i].word;
  words.splice(i,1); save(); renderLibrary();
  showToast(`「${w}」已移除`);
}

function loadPreset(){
  let added=0;
  PRESET_WORDS.forEach(p=>{
    if(!words.find(w=>w.word.toLowerCase()===p.word.toLowerCase())){
      words.push({...p,addedAt:Date.now()}); added++;
    }
  });
  save(); currentPage=1; renderLibrary();
  showToast(added>0?`已載入 ${added} 個預設單字 ✓`:'預設單字已全部載入過了');
}

function exportWords(){
  const blob = new Blob([JSON.stringify(words,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wordcraft_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  showToast('單字庫已匯出 ✓');
}

function importWords(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error('格式錯誤');
      let added=0;
      data.forEach(w=>{
        if(w.word&&w.meaning&&!words.find(x=>x.word.toLowerCase()===w.word.toLowerCase())){
          words.push({word:w.word,meaning:w.meaning,phonetic:w.phonetic||'',quizCount:w.quizCount||0,mastered:w.mastered||false,streak:w.streak||0,addedAt:Date.now()});
          added++;
        }
      });
      save(); currentPage=1; renderLibrary();
      showToast(`已匯入 ${added} 個單字 ✓`);
    } catch(err){ showToast('匯入失敗：JSON 格式有誤'); }
  };
  reader.readAsText(file);
  e.target.value='';
}

function openClearModal(){
  document.getElementById('clear-count').textContent = words.length;
  document.getElementById('clear-modal').classList.add('open');
}
function closeModal(){ document.getElementById('clear-modal').classList.remove('open'); }
function clearAll(){ words=[]; save(); currentPage=1; renderLibrary(); closeModal(); showToast('單字庫已清空'); }
document.getElementById('clear-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeModal(); });

// ─── Quiz ───
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function toggleChip(type){
  const el=document.getElementById('chip-'+type);
  const has=quizSettings.types.includes(type);
  if(has&&quizSettings.types.length===1){ showToast('至少選一種題型'); return; }
  if(has){ quizSettings.types=quizSettings.types.filter(t=>t!==type); el.classList.remove('sel'); }
  else{ quizSettings.types.push(type); el.classList.add('sel'); }
}
function selectDir(dir){
  quizSettings.dir=dir;
  ['en2zh','zh2en','mix'].forEach(d=>document.getElementById('chip-'+d).classList.toggle('sel',d===dir));
}
function selectCount(n){
  quizSettings.count=n;
  [10,20,0].forEach(c=>document.getElementById('chip-'+(c||'all')).classList.toggle('sel',c===n));
}

function startQuiz(){
  if(words.length<4){ showToast('至少需要 4 個單字才能測驗'); switchTab('library'); return; }
  const pool=shuffle(words);
  const count=quizSettings.count===0?pool.length:Math.min(quizSettings.count,pool.length);
  quizQueue=pool.slice(0,count).map(w=>{
    const type=quizSettings.types[Math.floor(Math.random()*quizSettings.types.length)];
    let dir=quizSettings.dir;
    if(dir==='mix') dir=Math.random()>0.5?'en2zh':'zh2en';
    if(type==='spell') dir='en2zh';
    return{word:w,type,dir};
  });
  quizIndex=0; score=0;
  document.getElementById('quiz-setup-view').style.display='none';
  document.getElementById('quiz-result-view').style.display='none';
  document.getElementById('quiz-play-view').style.display='block';
  showQuestion();
}

function showQuestion(){
  if(quizIndex>=quizQueue.length){ showResult(); return; }
  currentQ=quizQueue[quizIndex];
  currentWord=currentQ.word.word;
  const q=currentQ, total=quizQueue.length;
  document.getElementById('q-progress').textContent=`${quizIndex+1} / ${total}`;
  document.getElementById('q-progress-bar').style.width=`${(quizIndex/total)*100}%`;
  const badge=document.getElementById('q-type-badge');
  badge.textContent=q.type==='mc'?'選擇題':'拼寫題';
  badge.className='q-type-pill '+(q.type==='mc'?'q-type-mc':'q-type-spell');
  const fb=document.getElementById('q-feedback');
  fb.className='feedback-bar'; fb.textContent='';

  const isEn2Zh=q.dir==='en2zh';
  document.getElementById('q-prompt').textContent=isEn2Zh?'這個單字的意思是？':'這個意思的英文單字是？';
  document.getElementById('q-word').textContent=isEn2Zh?q.word.word:q.word.meaning;
  document.getElementById('q-phonetic').textContent=isEn2Zh?(q.word.phonetic||''):'';
  const audioRow=document.getElementById('q-audio-row');
  audioRow.style.display=isEn2Zh?'block':'none';
  if(isEn2Zh){
    const ab=document.getElementById('q-audio-btn');
    ab.disabled=false; ab.innerHTML='<i class="ti ti-volume"></i> 聆聽發音';
  }

  if(q.type==='mc'){
    document.getElementById('mc-choices').style.display='grid';
    document.getElementById('spell-area').style.display='none';
    const wrongPool=shuffle(words.filter(w=>w.word!==q.word.word)).slice(0,3);
    const choices=shuffle([q.word,...wrongPool]);
    document.getElementById('mc-choices').innerHTML=choices.map(c=>{
      const label=isEn2Zh?c.meaning:c.word;
      return `<button class="choice-btn" onclick="checkMC(this,'${escAttr(c.word)}','${escAttr(q.word.word)}')">${escHtml(label)}</button>`;
    }).join('');
    document.getElementById('q-actions').innerHTML='';
  } else {
    document.getElementById('mc-choices').style.display='none';
    document.getElementById('spell-area').style.display='block';
    const inp=document.getElementById('spell-input');
    inp.value=''; inp.className='spell-input'; inp.disabled=false;
    setTimeout(()=>inp.focus(),100);
    document.getElementById('q-actions').innerHTML=
      `<button class="btn btn-ghost" onclick="nextQuestion()">跳過</button>`+
      `<button class="btn btn-primary" onclick="checkSpell()"><i class="ti ti-check"></i>確認</button>`;
  }
}

function checkMC(btn,chosen,correct){
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const isEn2Zh=currentQ.dir==='en2zh';
  if(chosen===correct){
    btn.classList.add('correct'); score++; markMastery(correct,true);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{
      const w=words.find(x=>isEn2Zh?x.meaning===b.textContent:x.word===b.textContent);
      if(w&&w.word===correct) b.classList.add('correct');
    });
    markMastery(correct,false);
    const cw=words.find(w=>w.word===correct);
    showFeedback(false,`正確答案：${isEn2Zh?cw?.meaning:cw?.word}`);
  }
  currentQ.word.quizCount=(currentQ.word.quizCount||0)+1; save();
  document.getElementById('q-actions').innerHTML=`<button class="btn btn-primary" onclick="nextQuestion()">下一題 →</button>`;
}

function checkSpell(){
  const inp=document.getElementById('spell-input');
  const answer=inp.value.trim().toLowerCase();
  const correct=currentQ.word.word.toLowerCase();
  inp.disabled=true;
  if(answer===correct){
    inp.classList.add('correct'); score++; markMastery(currentQ.word.word,true);
  } else {
    inp.classList.add('wrong'); markMastery(currentQ.word.word,false);
    showFeedback(false,`正確拼法：${currentQ.word.word}`);
  }
  currentQ.word.quizCount=(currentQ.word.quizCount||0)+1; save();
  document.getElementById('q-actions').innerHTML=`<button class="btn btn-primary" onclick="nextQuestion()">下一題 →</button>`;
}

function showFeedback(ok,msg){
  const fb=document.getElementById('q-feedback');
  fb.textContent=msg; fb.className='feedback-bar show '+(ok?'correct':'wrong');
}

function markMastery(wordStr,correct){
  const w=words.find(x=>x.word===wordStr); if(!w) return;
  if(correct){ w.streak=(w.streak||0)+1; if(w.streak>=3) w.mastered=true; }
  else{ w.streak=0; w.mastered=false; }
}

function nextQuestion(){ quizIndex++; showQuestion(); }

function showResult(){
  document.getElementById('quiz-play-view').style.display='none';
  document.getElementById('quiz-result-view').style.display='block';
  const total=quizQueue.length, pct=Math.round((score/total)*100);
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-msg').textContent=pct>=90?'出色！你真的掌握了這些單字。':pct>=70?'很好！持續練習讓你更完美。':pct>=50?'繼續努力，你在進步中！':'別灰心，多複習幾次就能突破！';
  document.getElementById('r-sub').textContent=`共 ${total} 題`;
  document.getElementById('r-correct').textContent=score;
  document.getElementById('r-wrong').textContent=total-score;
  document.getElementById('quiz-setup-view').style.display='block';
  renderLibrary();
}

// ─── Init ───
renderLibrary();
</script>
</body>
</html>
