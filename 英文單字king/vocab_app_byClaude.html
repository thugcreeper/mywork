<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordcraft — 英文單字練習本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Lato:wght@300;400;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="vocab_app_byClaude.css" />
  <script src="vocab_app_byClaude.js" defer></script>
</head>

<body>
  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div>
          <div class="logo-mark">vocabulary studio</div>
          <h1>Word<em>craft</em></h1>
        </div>
        <div class="header-stats">
          <div class="hstat">
            <div class="hstat-num" id="hs-total">0</div>
            <div class="hstat-label">單字</div>
          </div>
          <div class="hstat">
            <div class="hstat-num" id="hs-mastered">0</div>
            <div class="hstat-label">熟練</div>
          </div>
        </div>
      </div>
      <div class="header-divider"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('library')"><i class="ti ti-books"></i>單字庫</button>
      <button class="tab" onclick="switchTab('quiz')"><i class="ti ti-brain"></i>測驗</button>
    </div>

    <!-- ═══════════════ LIBRARY ═══════════════ -->
    <div id="tab-library" class="panel active">

      <!-- IO section -->
      <div class="io-section">
        <h3><i class="ti ti-database" aria-hidden="true"></i> 單字庫管理</h3>
        <div class="io-row">
          <button class="btn btn-ghost" onclick="exportWords()"><i class="ti ti-download"></i>匯出 JSON</button>
          <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()"><i
              class="ti ti-upload"></i>匯入 JSON</button>
          <button class="btn btn-ghost" onclick="loadPreset()"><i class="ti ti-sparkles"></i>載入預設單字庫</button>
          <button class="btn btn-danger" onclick="openClearModal()"><i class="ti ti-trash"></i>清空</button>
          <input type="file" id="import-file" accept=".json" style="display:none" onchange="importWords(event)" />
        </div>
        <div class="io-note">💡 匯出 JSON 後可在其他裝置匯入，資料不會因清除快取而遺失。</div>
      </div>

      <!-- Search + toolbar -->
      <div class="lib-toolbar">
        <div class="search-wrap">
          <i class="ti ti-search" aria-hidden="true"></i>
          <input class="search-input" id="search-input" placeholder="搜尋單字或意思…" oninput="renderLibrary()" />
        </div>
        <span id="lib-count" style="font-size:13px;color:var(--text-faint);white-space:nowrap"></span>
      </div>

      <div class="word-list" id="word-list"></div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>

      <!-- Add form -->
      <div class="add-form">
        <div class="add-form-title"><i class="ti ti-plus" aria-hidden="true"></i> 新增單字</div>
        <div class="form-row">
          <input id="new-word" placeholder="英文單字"
            onkeydown="if(event.key==='Enter')document.getElementById('new-meaning').focus()" />
          <input id="new-phonetic" placeholder="音標（選填）e.g. /ˈæpəl/" />
        </div>
        <textarea id="new-meaning" placeholder="中文意思 / 解釋"
          onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))addWord()"></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addWord()"><i class="ti ti-plus"></i>新增單字</button>
        </div>
      </div>
    </div>

    <!-- ═══════════════ QUIZ ═══════════════ -->
    <div id="tab-quiz" class="panel">

      <!-- Setup -->
      <div id="quiz-setup-view">
        <div class="quiz-hero">
          <div class="quiz-hero-title">開始今日測驗</div>
          <div class="quiz-hero-sub">自訂題型與題數，挑戰自己</div>
          <div class="setup-section">
            <div class="setup-label">題目類型</div>
            <div class="chip-group">
              <div class="chip sel" id="chip-mc" onclick="toggleChip('mc')">選擇題</div>
              <div class="chip sel" id="chip-spell" onclick="toggleChip('spell')">拼寫題</div>
            </div>
          </div>
          <div class="setup-section">
            <div class="setup-label">方向</div>
            <div class="chip-group">
              <div class="chip sel" id="chip-en2zh" onclick="selectDir('en2zh')">英 → 中</div>
              <div class="chip" id="chip-zh2en" onclick="selectDir('zh2en')">中 → 英</div>
              <div class="chip" id="chip-mix" onclick="selectDir('mix')">混合</div>
            </div>
          </div>
          <div class="setup-section">
            <div class="setup-label">題數</div>
            <div class="chip-group">
              <div class="chip sel" id="chip-10" onclick="selectCount(10)">10 題</div>
              <div class="chip" id="chip-20" onclick="selectCount(20)">20 題</div>
              <div class="chip" id="chip-all" onclick="selectCount(0)">全部</div>
            </div>
          </div>
          <button class="quiz-start-btn" onclick="startQuiz()"><i class="ti ti-player-play"></i>開始測驗</button>
        </div>
      </div>

      <!-- Play -->
      <div id="quiz-play-view" style="display:none">
        <div class="quiz-card">
          <div class="q-top">
            <div class="q-counter" id="q-progress">1 / 10</div>
            <div class="q-type-pill" id="q-type-badge">選擇題</div>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="q-progress-bar" style="width:0%"></div>
          </div>
          <div class="q-prompt" id="q-prompt">這個單字的意思是？</div>
          <div class="q-word" id="q-word">—</div>
          <div class="q-phonetic" id="q-phonetic"></div>
          <div id="q-audio-row" style="display:none;margin-bottom:4px">
            <button class="audio-btn" id="q-audio-btn" onclick="playAudio(currentWord,'q-audio-btn')">
              <i class="ti ti-volume"></i>
            </button>
          </div>
          <div id="mc-choices" class="choices"></div>
          <div id="spell-area" style="display:none">
            <input class="spell-input" id="spell-input" placeholder="輸入拼寫…"
              onkeydown="if(event.key==='Enter')checkSpell()" autocomplete="off" autocorrect="off" spellcheck="false" />
          </div>
          <div class="feedback-bar" id="q-feedback"></div>
          <div class="q-actions" id="q-actions"></div>
        </div>
      </div>

      <!-- Result -->
      <div id="quiz-result-view" style="display:none">
        <div class="quiz-card">
          <div class="result-wrap">
            <div class="result-ring">
              <div class="result-pct" id="r-pct">—</div>
              <div class="result-label-sm">分數</div>
            </div>
            <div class="result-msg" id="r-msg"></div>
            <div class="result-sub" id="r-sub"></div>
            <div class="result-breakdown">
              <div class="rb-item">
                <div class="rb-num good" id="r-correct">0</div>
                <div class="rb-lbl">正確</div>
              </div>
              <div class="rb-item">
                <div class="rb-num bad" id="r-wrong">0</div>
                <div class="rb-lbl">錯誤</div>
              </div>
            </div>
            <div class="btn-row" style="justify-content:center">
              <button class="btn btn-primary" onclick="startQuiz()"><i class="ti ti-refresh"></i>再測一次</button>
              <button class="btn btn-ghost" onclick="switchTab('library')"><i class="ti ti-books"></i>單字庫</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Clear modal -->
  <div class="modal-overlay" id="clear-modal">
    <div class="modal">
      <h2>清空單字庫？</h2>
      <p>這將刪除所有 <strong id="clear-count">0</strong> 個單字，此操作無法復原。<br>建議先「匯出 JSON」備份。</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-danger" onclick="clearAll()"><i class="ti ti-trash"></i>確認清空</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</body>

</html>
